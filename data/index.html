<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Battery Logger</title>
  <style>
    :root {
      --bg: #0f1115;
      --card: #1a1d24;
      --accent: #4aa8df;
      --good: #2ecc71;
      --warn: #f39c12;
      --muted: #8a8f98;
      --text: #e6e6e6;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    header {
      padding: 1rem 1.5rem;
      background: linear-gradient(135deg, #1f242d, #11141a);
      border-bottom: 1px solid #2a2f38;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    header h1 { margin: 0; font-size: 1.25rem; }
    header .meta { color: var(--muted); font-size: 0.85rem; }
    main { padding: 1.5rem; max-width: 900px; margin: 0 auto; }
    .grid {
      display: grid;
      gap: 1rem;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    }
    .card {
      background: var(--card);
      border: 1px solid #262b34;
      border-radius: 10px;
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .card.complete { border-color: var(--good); }
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.25rem;
    }
    .card h2 { margin: 0; font-size: 1rem; }
    .badge {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 0.15rem 0.5rem;
      border-radius: 999px;
      border: 1px solid transparent;
    }
    .badge.waiting  { color: var(--muted);  border-color: #3a4049; }
    .badge.logging  { color: var(--accent); border-color: var(--accent); }
    .badge.complete { color: var(--good);   border-color: var(--good); }
    .capacity {
      font-size: 2.5rem;
      font-weight: 700;
      text-align: center;
      padding: 0.5rem 0;
    }
    .capacity .unit { font-size: 1rem; color: var(--muted); font-weight: 400; }
    .metric { display: flex; justify-content: space-between; font-size: 0.9rem; }
    .metric .label { color: var(--muted); }
    .meter {
      height: 8px;
      background: #11141a;
      border-radius: 4px;
      overflow: hidden;
      margin: 0.25rem 0;
    }
    .meter > div {
      height: 100%;
      background: linear-gradient(90deg, var(--warn), var(--good));
      width: 0%;
      transition: width 0.5s ease;
    }
    .actions { display: flex; gap: 0.5rem; margin-top: 0.5rem; }
    button, a.btn {
      flex: 1;
      padding: 0.4rem 0.75rem;
      border-radius: 8px;
      border: 1px solid #2a2f38;
      background: #22262f;
      color: var(--text);
      cursor: pointer;
      font-size: 0.8rem;
      text-align: center;
      text-decoration: none;
    }
    button:hover, a.btn:hover { border-color: var(--accent); }
    button.reset { color: var(--warn); }
    footer {
      text-align: center;
      color: var(--muted);
      font-size: 0.75rem;
      padding: 2rem 1rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>🔋 Battery Logger</h1>
    <div class="meta" id="meta">connecting…</div>
  </header>

  <main>
    <section class="grid" id="channels"></section>
  </main>

  <footer>
    Passive INA219 logger &middot; <span id="fw">fw ?</span> &middot;
    auto-refresh every 5s
  </footer>

  <script>
    const NUM = 5;
    const channelsEl = document.getElementById('channels');
    const metaEl = document.getElementById('meta');
    const fwEl = document.getElementById('fw');
    const cards = {};

    for (let i = 0; i < NUM; i++) {
      cards[i] = buildCard(i);
      channelsEl.appendChild(cards[i].root);
    }

    function buildCard(i) {
      const root = document.createElement('div');
      root.className = 'card';
      root.innerHTML = `
        <div class="card-header">
          <h2>Channel ${i + 1}</h2>
          <span class="badge waiting" data-state>waiting</span>
        </div>
        <div class="capacity" data-cap>— <span class="unit">mAh</span></div>
        <div class="meter"><div data-fill></div></div>
        <div class="metric"><span class="label">Voltage</span><span data-v>— V</span></div>
        <div class="metric"><span class="label">Current</span><span data-a>— A</span></div>
        <div class="metric"><span class="label">Elapsed</span><span data-time>—</span></div>
        <div class="actions">
          <button class="reset" data-reset>Reset</button>
          <a class="btn" href="/api/history?n=${i}" download>CSV ↓</a>
        </div>
      `;
      root.querySelector('[data-reset]').addEventListener('click', () => resetChannel(i));
      return {
        root,
        state: root.querySelector('[data-state]'),
        cap: root.querySelector('[data-cap]'),
        fill: root.querySelector('[data-fill]'),
        v: root.querySelector('[data-v]'),
        a: root.querySelector('[data-a]'),
        time: root.querySelector('[data-time]'),
      };
    }

    function fmtTime(s) {
      if (s == null || isNaN(s)) return '—';
      const h = Math.floor(s / 3600);
      const m = Math.floor((s % 3600) / 60);
      const sec = s % 60;
      return h > 0 ? `${h}h ${m}m` : `${m}m ${sec}s`;
    }

    async function resetChannel(i) {
      try {
        await fetch(`/api/reset?n=${i}`, { method: 'POST' });
        pollOnce();
      } catch (e) { console.error(e); }
    }

    function updateCard(ch) {
      const c = cards[ch.channel];
      if (!c) return;
      c.state.textContent = ch.state;
      c.state.className = `badge ${ch.state}`;
      c.root.className = `card ${ch.state === 'complete' ? 'complete' : ''}`;
      const mah = ch.capacity_mah || 0;
      c.cap.innerHTML = `${mah.toFixed(0)} <span class="unit">mAh</span>`;
      c.v.textContent = (ch.voltage ?? 0).toFixed(3) + ' V';
      c.a.textContent = (ch.current ?? 0).toFixed(3) + ' A';
      c.time.textContent = fmtTime(ch.elapsed_s);
      // Voltage bar: map 2.0V..4.2V to 0..100%
      const pct = Math.max(0, Math.min(100, ((ch.voltage - 2.0) / 2.2) * 100));
      c.fill.style.width = pct + '%';
    }

    async function pollOnce() {
      try {
        const res = await fetch('/api/status');
        const json = await res.json();
        (json.channels || []).forEach(updateCard);
      } catch (e) {
        metaEl.textContent = 'connection lost';
      }
    }

    async function loadInfo() {
      try {
        const res = await fetch('/api/info');
        const info = await res.json();
        fwEl.textContent = `fw ${info.firmware}`;
        metaEl.textContent = `${info.channels} channels · logs every ${info.log_interval_s}s`;
      } catch (_) {}
    }

    loadInfo();
    pollOnce();
    setInterval(pollOnce, 5000);
  </script>
</body>
</html>
