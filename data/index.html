<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Battery Logger</title>
  <style>
    :root {
      --bg: #0f1115;
      --card: #1a1d24;
      --accent: #4aa8df;
      --good: #2ecc71;
      --warn: #f39c12;
      --muted: #8a8f98;
      --text: #e6e6e6;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    header {
      padding: 1rem 1.5rem;
      background: linear-gradient(135deg, #1f242d, #11141a);
      border-bottom: 1px solid #2a2f38;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    header h1 { margin: 0; font-size: 1.25rem; }
    header .meta { color: var(--muted); font-size: 0.85rem; }
    main { padding: 1.5rem; max-width: 900px; margin: 0 auto; }
    .grid {
      display: grid;
      gap: 1rem;
      /* Prefer 4 columns when the viewport is wide enough for two rows of 4. */
      grid-template-columns: repeat(4, 1fr);
    }
    @media (max-width: 1200px) {
      .grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
    @media (max-width: 600px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
    .card {
      background: var(--card);
      border: 1px solid #262b34;
      border-radius: 10px;
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .card.complete { border-color: var(--good); }
    .card.offline { border-color: #ff4d4d; opacity: 0.75; }
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.25rem;
    }
    .card h2 { margin: 0; font-size: 1rem; }
    .badge {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 0.15rem 0.5rem;
      border-radius: 999px;
      border: 1px solid transparent;
    }
    .badge.waiting  { color: var(--muted);  border-color: #3a4049; }
    .badge.logging  { color: var(--accent); border-color: var(--accent); }
    .badge.complete { color: var(--good);   border-color: var(--good); }
    .badge.low_voltage { color: #ff4d4d;   border-color: #ff4d4d; }
    .badge.offline  { color: #ff4d4d;       border-color: #ff4d4d; }
    .badge.interrupted { color: #ffb454;    border-color: #ffb454; }
    .capacity {
      font-size: 2.5rem;
      font-weight: 700;
      text-align: center;
      padding: 0.5rem 0;
      line-height: 1.1;
    }
    .capacity .unit { font-size: 1rem; color: var(--muted); font-weight: 400; }
    .wh {
      font-size: 0.85rem;
      color: var(--muted);
      text-align: center;
      margin-top: -0.25rem;
      margin-bottom: 0.25rem;
    }
    .estimate {
      font-size: 0.8rem;
      color: var(--accent);
      text-align: center;
      margin-bottom: 0.5rem;
      min-height: 1.1em;
    }
    .estimate[hidden] { display: none; }
    .metric { display: flex; justify-content: space-between; font-size: 0.9rem; }
    .metric .label { color: var(--muted); }
    .meter {
      height: 8px;
      background: #11141a;
      border-radius: 4px;
      overflow: hidden;
      margin: 0.25rem 0;
    }
    .meter > div {
      height: 100%;
      background: linear-gradient(90deg, var(--warn), var(--good));
      width: 0%;
      transition: width 0.5s ease;
    }
    .sparkline {
      height: 20px;
      min-height: 20px;
      max-height: 20px;
      width: 100%;
      background: #11141a;
      border-radius: 4px;
      overflow: hidden;
      display: block;
    }
    .discharge {
      font-size: 0.75rem;
      color: var(--muted);
      text-align: center;
      min-height: 1em;
    }
    .actions { display: flex; gap: 0.5rem; margin-top: 0.5rem; }
    button, a.btn {
      flex: 1;
      padding: 0.4rem 0.75rem;
      border-radius: 8px;
      border: 1px solid #2a2f38;
      background: #22262f;
      color: var(--text);
      cursor: pointer;
      font-size: 0.8rem;
      text-align: center;
      text-decoration: none;
    }
    button:hover, a.btn:hover { border-color: var(--accent); }
    button.reset { color: var(--warn); }
    footer {
      text-align: center;
      color: var(--muted);
      font-size: 0.75rem;
      padding: 2rem 1rem;
    }
    header .actions-h { display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; }
    #alerts-btn {
      padding: 0.35rem 0.7rem;
      border-radius: 8px;
      border: 1px solid #2a2f38;
      background: #22262f;
      color: var(--text);
      cursor: pointer;
      font-size: 0.8rem;
      white-space: nowrap;
    }
    #alerts-btn:hover { border-color: var(--accent); }
    .toast-wrap {
      position: fixed;
      top: 1rem;
      right: 1rem;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      pointer-events: none;
    }
    .toast {
      background: var(--card);
      border: 1px solid var(--good);
      border-left: 4px solid var(--good);
      border-radius: 8px;
      padding: 0.6rem 0.9rem;
      font-size: 0.85rem;
      color: var(--text);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
      max-width: 280px;
      opacity: 0;
      transform: translateX(20px);
      transition: opacity 0.3s ease, transform 0.3s ease;
    }
    .toast.show { opacity: 1; transform: translateX(0); }
    @keyframes cardFlash {
      0%, 100% { box-shadow: 0 0 0 0 rgba(46, 204, 113, 0); }
      20%      { box-shadow: 0 0 0 3px rgba(46, 204, 113, 0.85); }
    }
    .card.alert-flash { animation: cardFlash 1.5s ease; }
    @media (prefers-reduced-motion: reduce) {
      .toast { transition: none; }
      .card.alert-flash { animation: none; }
    }
  </style>
</head>
<body>
  <header>
    <h1>🔋 Battery Logger</h1>
    <div class="actions-h">
      <button id="alerts-btn" title="Enable completion notifications">🔔 Enable alerts</button>
      <div class="meta" id="meta">connecting…</div>
    </div>
  </header>

  <div class="toast-wrap" id="toasts"></div>

  <main>
    <section class="grid" id="channels"></section>
  </main>

  <footer>
    Passive INA219 logger &middot; <span id="fw">fw ?</span> &middot;
    auto-refresh every 5s
  </footer>

  <script>
    const NUM = 8;
    const channelsEl = document.getElementById('channels');
    const metaEl = document.getElementById('meta');
    const fwEl = document.getElementById('fw');
    const cards = {};

    // --- Completion alerts ---------------------------------------------------
    // OS notifications need a secure context (HTTPS), which the ESP8266 doesn't
    // serve, so they only work in Firefox / on localhost. The in-page toast and
    // beep are the fallback and fire everywhere.
    const alertsBtn = document.getElementById('alerts-btn');
    const toastsEl = document.getElementById('toasts');
    const lastState = {};
    let audioCtx = null;

    function updateAlertsBtn() {
      if (!('Notification' in window)) {
        alertsBtn.textContent = '🔔 In-page alerts';
        alertsBtn.title = 'OS notifications need HTTPS; in-page banner + sound still work';
        return;
      }
      if (Notification.permission === 'granted') {
        alertsBtn.textContent = '🔔 Alerts on';
      } else if (Notification.permission === 'denied') {
        alertsBtn.textContent = '🔕 Alerts blocked';
      } else {
        alertsBtn.textContent = '🔔 Enable alerts';
      }
    }

    alertsBtn.addEventListener('click', async () => {
      // A user gesture is required to unlock audio and request permission.
      try {
        audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') await audioCtx.resume();
      } catch (_) {}
      if ('Notification' in window && Notification.permission === 'default') {
        try { await Notification.requestPermission(); } catch (_) {}
      }
      updateAlertsBtn();
      beep();  // confirm alerts are audible
    });

    function beep() {
      if (!audioCtx) return;
      try {
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.type = 'sine';
        o.frequency.value = 880;
        o.connect(g); g.connect(audioCtx.destination);
        const t = audioCtx.currentTime;
        g.gain.setValueAtTime(0.12, t);
        g.gain.exponentialRampToValueAtTime(0.0001, t + 0.4);
        o.start(t);
        o.stop(t + 0.4);
      } catch (_) {}
    }

    function toast(msg) {
      const el = document.createElement('div');
      el.className = 'toast';
      el.textContent = msg;
      toastsEl.appendChild(el);
      requestAnimationFrame(() => el.classList.add('show'));
      setTimeout(() => {
        el.classList.remove('show');
        setTimeout(() => el.remove(), 400);
      }, 8000);
    }

    function flashCard(i) {
      const c = cards[i];
      if (!c) return;
      c.root.classList.remove('alert-flash');
      void c.root.offsetWidth;  // reflow so the animation restarts
      c.root.classList.add('alert-flash');
    }

    function notify(title, body) {
      toast(`${title} — ${body}`);
      beep();
      if ('Notification' in window && Notification.permission === 'granted') {
        try { new Notification(title, { body, tag: title }); } catch (_) {}
      }
    }

    updateAlertsBtn();

    for (let i = 0; i < NUM; i++) {
      cards[i] = buildCard(i);
      channelsEl.appendChild(cards[i].root);
    }

    function buildCard(i) {
      const root = document.createElement('div');
      root.className = 'card';
      root.innerHTML = `
        <div class="card-header">
          <h2>Channel ${i + 1}</h2>
          <span class="badge waiting" data-state title="INA219 state">waiting</span>
          <span class="badge interrupted" data-interrupted hidden
                title="Device rebooted while this battery was connected; part of the discharge was not measured">interrupted</span>
        </div>
        <div class="capacity" data-cap>— <span class="unit">mAh</span></div>
        <div class="wh" data-wh>— Wh</div>
        <div class="estimate" data-estimate hidden
             title="Predicted final capacity/energy from the start voltage (±~7% typical). Not a measurement."></div>
        <div class="meter"><div data-fill></div></div>
        <div class="metric"><span class="label">Voltage</span><span data-v>— V</span></div>
        <div class="metric"><span class="label">Current</span><span data-a>— A</span></div>
        <div class="metric"><span class="label">Elapsed</span><span data-time>—</span></div>
        <svg class="sparkline" data-spark viewBox="0 0 100 20" preserveAspectRatio="none">
          <polyline fill="none" stroke="var(--accent)" stroke-width="1.5" points=""/>
        </svg>
        <div class="discharge" data-discharge></div>
        <div class="actions">
          <button class="reset" data-reset>Reset</button>
          <a class="btn" href="/api/history?n=${i}" download id="dl-${i}">CSV ↓</a>
        </div>
      `;
      root.querySelector('[data-reset]').addEventListener('click', () => resetChannel(i));
      return {
        root,
        state: root.querySelector('[data-state]'),
        interrupted: root.querySelector('[data-interrupted]'),
        cap: root.querySelector('[data-cap]'),
        wh: root.querySelector('[data-wh]'),
        estimate: root.querySelector('[data-estimate]'),
        fill: root.querySelector('[data-fill]'),
        v: root.querySelector('[data-v]'),
        a: root.querySelector('[data-a]'),
        time: root.querySelector('[data-time]'),
        spark: root.querySelector('[data-spark] polyline'),
        discharge: root.querySelector('[data-discharge]'),
      };
    }

    function fmtTime(s) {
      if (s == null || isNaN(s)) return '—';
      const h = Math.floor(s / 3600);
      const m = Math.floor((s % 3600) / 60);
      const sec = s % 60;
      return h > 0 ? `${h}h ${m}m` : `${m}m ${sec}s`;
    }

    async function resetChannel(i) {
      try {
        await fetch(`/api/reset?n=${i}`, { method: 'POST' });
        pollOnce();
      } catch (e) { console.error(e); }
    }

    function updateCard(ch) {
      const c = cards[ch.channel];
      if (!c) return;
      const dl = document.getElementById(`dl-${ch.channel}`);
      if (dl) dl.download = `channel_${ch.channel}_${Date.now()}.csv`;
      const isConnected = ch.connected !== false;
      const displayState = isConnected ? ch.state : 'offline';

      // Alert when a channel leaves the logging state. Ignore the first
      // observation (undefined) and resets/starts (logging is the target).
      const prevState = lastState[ch.channel];
      lastState[ch.channel] = displayState;
      let finished = false, stopped = false;
      if (prevState === 'logging' && displayState !== 'logging') {
        const mah = Math.round(ch.capacity_mah || 0);
        if (displayState === 'low_voltage') {
          const wh = (ch.capacity_wh || 0).toFixed(2);
          notify(`Channel ${ch.channel + 1} finished`, `${mah} mAh · ${wh} Wh`);
          finished = true;
        } else if (displayState === 'offline') {
          notify(`Channel ${ch.channel + 1} stopped`, `disconnected while logging · ${mah} mAh`);
          stopped = true;
        }
      }

      c.state.textContent = displayState;
      c.state.className = `badge ${displayState}`;
      c.interrupted.hidden = !(isConnected && ch.interrupted);
      c.root.className = `card ${ch.state === 'low_voltage' ? 'low_voltage' : ''} ${isConnected ? '' : 'offline'}`;
      if (!isConnected) {
        c.cap.innerHTML = '— <span class="unit">mAh</span>';
        c.wh.textContent = '— Wh';
        c.estimate.hidden = true;
        c.v.textContent = '— V';
        c.a.textContent = '— A';
        c.time.textContent = '—';
        c.fill.style.width = '0%';
        c.spark.setAttribute('points', '');
        c.discharge.textContent = 'INA219 not connected';
        if (stopped) flashCard(ch.channel);
        return;
      }
      const mah = ch.capacity_mah || 0;
      const wh = ch.capacity_wh || 0;
      c.cap.innerHTML = `${Math.round(mah)} <span class="unit">mAh</span>`;
      c.wh.textContent = `${wh.toFixed(2)} Wh`;
      // Early prediction of the final capacity/energy from the start voltage.
      // null (out of calibrated band) or absent -> hide the row.
      const estMah = ch.estimated_capacity_mah;
      if (estMah == null) {
        c.estimate.hidden = true;
      } else {
        const estWh = ch.estimated_capacity_wh;
        c.estimate.hidden = false;
        c.estimate.textContent = `est. final ~${Math.round(estMah)} mAh`
          + (estWh == null ? '' : ` · ~${estWh.toFixed(2)} Wh`);
      }
      c.v.textContent = (ch.voltage == null ? '—' : ch.voltage.toFixed(3)) + ' V';
      c.a.textContent = (ch.current == null ? '—' : ch.current.toFixed(3)) + ' A';
      c.time.textContent = fmtTime(ch.elapsed_s);
      // Voltage bar: map 2.0V..4.2V to 0..100%
      const pct = ch.voltage == null ? 0
        : Math.max(0, Math.min(100, ((ch.voltage - 2.0) / 2.2) * 100));
      c.fill.style.width = pct + '%';
      loadSparkline(ch.channel);
      if (finished) flashCard(ch.channel);
    }

    async function loadSparkline(i) {
      const c = cards[i];
      if (!c) return;
      try {
        const res = await fetch(`/api/history?n=${i}`);
        const text = await res.text();
        const rows = text.trim().split('\n').slice(1);
        if (rows.length < 2) {
          c.spark.setAttribute('points', '');
          c.discharge.textContent = '';
          return;
        }
        // CSV columns: seconds_since_reset, elapsed_s, voltage, current_a, capacity_mah
        let samples = rows.map(r => r.split(',').map(Number));
        const maxT = samples[samples.length - 1][1]; // elapsed_s
        const cutoffT = maxT - 1800; // last 30 minutes
        samples = samples.filter(([, t]) => t >= cutoffT).slice(-60);
        if (samples.length < 2) {
          c.spark.setAttribute('points', '');
          c.discharge.textContent = '';
          return;
        }
        const tMin = samples[0][1];
        const tMax = samples[samples.length - 1][1];
        const vMin = 2.0, vMax = 4.2;
        const points = samples.map(([, t, v]) => {
          const x = ((t - tMin) / (tMax - tMin || 1)) * 100;
          const y = 20 - ((Math.max(vMin, Math.min(vMax, v)) - vMin) / (vMax - vMin)) * 20;
          return `${x.toFixed(2)},${y.toFixed(2)}`;
        }).join(' ');
        c.spark.setAttribute('points', points);

        // Find peak voltage and report discharge since then.
        let peakIdx = 0;
        for (let i = 1; i < samples.length; i++) {
          if (samples[i][1] > samples[peakIdx][1]) peakIdx = i;
        }
        const peak = samples[peakIdx];
        const now = samples[samples.length - 1];
        const dt = now[0] - peak[0];
        const mah = now[3] - peak[3];
        let wh = 0;
        for (let i = peakIdx + 1; i < samples.length; i++) {
          const dtSeg = samples[i][1] - samples[i - 1][1];
          const vAvg = (samples[i][2] + samples[i - 1][2]) / 2;
          const iAvg = Math.abs((samples[i][3] + samples[i - 1][3]) / 2);
          wh += vAvg * iAvg * (dtSeg / 3600);
        }
        c.discharge.textContent = dt > 0
          ? `↓ ${fmtTime(dt)}`
          : '';
      } catch (e) { console.error(e); }
    }

    async function pollOnce() {
      try {
        const res = await fetch('/api/status');
        const json = await res.json();
        (json.channels || []).forEach(updateCard);
      } catch (e) {
        metaEl.textContent = 'connection lost';
      }
    }

    async function loadInfo() {
      try {
        const res = await fetch('/api/info');
        const info = await res.json();
        fwEl.textContent = `fw ${info.firmware}`;
        metaEl.textContent = `${info.channels} channels · logs on ${info.log_voltage_delta_v}V change or ${info.log_max_quiet_s}s`;
      } catch (_) {}
    }

    loadInfo();
    pollOnce();
    setInterval(pollOnce, 5000);
  </script>
</body>
</html>
