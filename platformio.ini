; PlatformIO project configuration for the 5-channel battery capacity logger
; Target board: ESP8266 (NodeMCU 1.0 / Wemos D1 R2)
; Documentation: https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = nodemcuv2

[common]
monitor_speed = 115200

[env:nodemcuv2]
platform = espressif8266
board = nodemcuv2
framework = arduino
monitor_speed = ${common.monitor_speed}

; Library dependencies (resolved via PlatformIO registry)
lib_deps =
    adafruit/Adafruit INA219@^1.2.0

; Filesystem image (web UI assets live in /data and are uploaded via
; `pio run -t uploadfs`)
board_build.filesystem = littlefs

; Upload/monitor config
monitor_filters = esp8266_exception_decoder, time
upload_speed = 921600

; Extra build flags
build_flags =
    -D ESP8266
    -D NUM_CHANNELS=5
    -D BAUD_RATE=115200
    -D LOG_INTERVAL_MS=5000
    -I src
