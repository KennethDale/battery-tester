; PlatformIO project configuration for the 5-channel battery tester
; Target board: ESP8266 (NodeMCU 1.0 / Wemos D1 R2)
; Documentation: https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = nodemcuv2

; Common settings shared across any future environments
[common]
monitor_speed = 115200
lib_deps_builtin =
    ESP8266WiFi
    ESP8266WebServer
    ESP8266mDNS
    ArduinoJson
    LittleFS

[env:nodemcuv2]
platform = espressif8266
board = nodemcuv2
framework = arduino
monitor_speed = ${common.monitor_speed}

; Library dependencies (resolved via PlatformIO registry)
lib_deps =
    bblanchon/ArduinoJson@^7.1.0

; Filesystem image (web UI assets live in /data and are uploaded via
; `pio run -t uploadfs`)
board_build.filesystem = littlefs

; Upload/monitor config
monitor_filters = esp8266_exception_decoder, time
upload_speed = 921600

; Extra build flags
build_flags =
    -D ESP8266
    -D NUM_CHANNELS=5
    -D BAUD_RATE=115200